<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Task 2</title>

    <style>

        body{
            font-family: Arial;
            text-align: center;
            background-color: #f2f2f2;
            margin-top: 50px;
        }

        h1{
            color: #333;
        }

        button{
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: blue;
            color: white;
        }

        input{
            padding: 10px;
            margin: 10px;
            width: 200px;
        }

        .calculator{
            margin-top: 40px;
        }

    </style>
</head>

<body>

    <h1>JavaScript Task 2</h1>

    <!-- Color Change Button -->

    <button id="colorButton" onclick="changeColor()">
        Click Me
    </button>

    <br><br>

    <!-- Greeting Button -->

    <button onclick="showGreeting()">
        Show Greeting
    </button>

    <!-- Calculator -->

    <div class="calculator">

        <h2>Simple Calculator</h2>

        <input type="number" id="num1" placeholder="Enter first number">

        <input type="number" id="num2" placeholder="Enter second number">

        <br>

        <button onclick="addNumbers()">
            Add Numbers
        </button>

        <h3 id="result"></h3>

    </div>

    <script>

        // Button Color Change

        function changeColor(){

            let button = document.getElementById("colorButton");

            button.style.backgroundColor = "green";

        }

        // Greeting Alert

        function showGreeting(){

            let hour = new Date().getHours();

            let message;

            if(hour < 12){

                message = "Good Morning!";

            }

            else if(hour < 18){

                message = "Good Afternoon!";

            }

            else{

                message = "Good Evening!";

            }

            alert(message);

        }

        // Calculator

        function addNumbers(){

            let num1 = Number(document.getElementById("num1").value);

            let num2 = Number(document.getElementById("num2").value);

            let sum = num1 + num2;

            document.getElementById("result").innerHTML =
            "Result: " + sum;

        }

    </script>

</body>
</html>
